<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Color Spaces</title>
		<style>
			html, body {
				margin: 0;
				padding: 0;
				height: 100%;
				background-color: #444444;
				color: white;
				font-family: Arial, Helvetica, sans-serif;
				overflow: hidden;
			}

			#container3D {
				width: 100%;
				height: calc(100% - 44px);
			}

			#view-toolbar {
				position: fixed;
				bottom: 0;
				left: 0;
				width: 100%;
				height: 44px;
				background: #1a1a1a;
				border-top: 1px solid #444;
				display: flex;
				align-items: center;
				padding: 0 12px;
				gap: 6px;
				box-sizing: border-box;
				z-index: 100;
			}

			.toolbar-label {
				font-size: 11px;
				font-weight: bold;
				color: #aaa;
				text-transform: uppercase;
				letter-spacing: 0.06em;
				margin-right: 2px;
				white-space: nowrap;
			}

			.toolbar-sep {
				width: 1px;
				height: 24px;
				background: #444;
				margin: 0 6px;
			}

			#view-toolbar button {
				background: #2e2e2e;
				color: #ccc;
				border: 1px solid #555;
				border-radius: 4px;
				padding: 4px 10px;
				font-size: 12px;
				cursor: pointer;
				transition: background 0.15s, color 0.15s;
				white-space: nowrap;
			}

			#view-toolbar button:hover {
				background: #3e3e3e;
				color: #fff;
			}

			#view-toolbar button.active {
				background: #0078d4;
				border-color: #0078d4;
				color: #fff;
			}

			#view-toolbar select {
				background: #2e2e2e;
				color: #ccc;
				border: 1px solid #555;
				border-radius: 4px;
				padding: 4px 8px;
				font-size: 12px;
				cursor: pointer;
			}

			#view-toolbar select:disabled {
				opacity: 0.4;
				cursor: not-allowed;
			}

			#view-toolbar input[type="range"] {
				width: 90px;
				cursor: pointer;
				accent-color: #0078d4;
			}

			#view-toolbar input[type="range"]:disabled {
				opacity: 0.4;
				cursor: not-allowed;
			}
		</style>
	</head>
	<body>
		<div id="container3D"></div>

		<div id="view-toolbar">
			<span class="toolbar-label">Vistas</span>
			<button id="btn-perspective" class="active">Perspectiva</button>
			<button id="btn-top">Top</button>
			<button id="btn-left">Left</button>
			<button id="btn-front">Front</button>

			<div class="toolbar-sep"></div>

			<span class="toolbar-label">Rendering</span>
			<button id="btn-solid" class="active">Solid</button>
			<button id="btn-dots">Dots</button>

			<div class="toolbar-sep"></div>

			<span class="toolbar-label">Subconjunto</span>
			<select id="select-subset" disabled>
				<option value="all">Todos</option>
				<option value="hues">HUEs (tonos puros)</option>
				<option value="grays">Grises</option>
				<option value="hue0">HUE = 0</option>
				<option value="hue60">HUE = 60</option>
				<option value="hue120">HUE = 120</option>
				<option value="hue180">HUE = 180</option>
				<option value="hue240">HUE = 240</option>
				<option value="hue300">HUE = 300</option>
			</select>

			<span class="toolbar-label">Tolerancia</span>
			<input type="range" id="range-tolerance" min="0" max="1" step="0.01" value="0.4" disabled />
		</div>

		<script type="module" src="/src/main.js"></script>
	</body>
</html>
