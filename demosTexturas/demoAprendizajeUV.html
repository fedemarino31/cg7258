<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<title>Aprendizaje UV Interactivo</title>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				height: 100%;
				overflow: hidden;
				font-family: Arial, Helvetica, sans-serif;
			}

			body {
				display: flex;
				flex-direction: row;
			}

			#container3D {
				flex: 0 0 50%;
				height: 100%;
				position: relative;
			}

			#panel {
				flex: 0 0 50%;
				height: 100%;
				display: flex;
				flex-direction: column;
				background: #1a1a2e;
				color: white;
				box-sizing: border-box;
			}

			#panel-editor {
				flex: 0 0 50%;
				overflow-y: auto;
				padding: 16px;
				box-sizing: border-box;
				border-bottom: 1px solid #333;
			}

			#panel-uv {
				flex: 0 0 50%;
				display: flex;
				flex-direction: column;
				padding: 12px 16px 16px;
				box-sizing: border-box;
				min-height: 0;
			}

			#panel h2 {
				margin-top: 0;
				color: #e0e0ff;
				border-bottom: 1px solid #444;
				padding-bottom: 8px;
			}

			#panel h3 {
				color: #aaaaff;
				margin: 0 0 8px 0;
			}

			.vertex-row {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 8px;
			}

			.vertex-label {
				min-width: 28px;
				font-weight: bold;
				color: #ffdd88;
			}

			.coord-group {
				display: flex;
				align-items: center;
				gap: 4px;
			}

			.coord-group label {
				font-size: 12px;
				color: #aaa;
			}

			.coord-group input[type='text'] {
				width: 60px;
				background: #2a2a4e;
				color: white;
				border: 1px solid #555;
				border-radius: 4px;
				padding: 3px 5px;
				font-size: 13px;
			}

			#btnActualizar {
				display: block;
				width: 100%;
				margin-top: 16px;
				padding: 10px;
				background: #4444aa;
				color: white;
				border: none;
				border-radius: 6px;
				font-size: 15px;
				cursor: pointer;
			}

			#btnActualizar:hover {
				background: #5555cc;
			}

			#uv-canvas-wrap {
				flex: 1;
				min-height: 0;
				position: relative;
			}

			#uvCanvas {
				width: 100%;
				height: 100%;
				display: block;
			}
		</style>
	</head>
	<body>
		<div id="container3D"></div>

		<div id="panel">
			<!-- Mitad superior: editor UV -->
			<div id="panel-editor">
				<h2>Editor UV</h2>

				<h3>Triángulo 1</h3>

				<div class="vertex-row">
					<span class="vertex-label">v0:</span>
					<div class="coord-group">
						<label>u</label>
						<input type="text" inputmode="decimal" id="t1v0u" value="0" />
					</div>
					<div class="coord-group">
						<label>v</label>
						<input type="text" inputmode="decimal" id="t1v0v" value="0" />
					</div>
				</div>

				<div class="vertex-row">
					<span class="vertex-label">v1:</span>
					<div class="coord-group">
						<label>u</label>
						<input type="text" inputmode="decimal" id="t1v1u" value="1" />
					</div>
					<div class="coord-group">
						<label>v</label>
						<input type="text" inputmode="decimal" id="t1v1v" value="0" />
					</div>
				</div>

				<div class="vertex-row">
					<span class="vertex-label">v2:</span>
					<div class="coord-group">
						<label>u</label>
						<input type="text" inputmode="decimal" id="t1v2u" value="0" />
					</div>
					<div class="coord-group">
						<label>v</label>
						<input type="text" inputmode="decimal" id="t1v2v" value="1" />
					</div>
				</div>

				<h3>Triángulo 2</h3>

				<div class="vertex-row">
					<span class="vertex-label">v3:</span>
					<div class="coord-group">
						<label>u</label>
						<input type="text" inputmode="decimal" id="t2v3u" value="0" />
					</div>
					<div class="coord-group">
						<label>v</label>
						<input type="text" inputmode="decimal" id="t2v3v" value="1" />
					</div>
				</div>

				<div class="vertex-row">
					<span class="vertex-label">v4:</span>
					<div class="coord-group">
						<label>u</label>
						<input type="text" inputmode="decimal" id="t2v4u" value="1" />
					</div>
					<div class="coord-group">
						<label>v</label>
						<input type="text" inputmode="decimal" id="t2v4v" value="0" />
					</div>
				</div>

				<div class="vertex-row">
					<span class="vertex-label">v5:</span>
					<div class="coord-group">
						<label>u</label>
						<input type="text" inputmode="decimal" id="t2v5u" value="1" />
					</div>
					<div class="coord-group">
						<label>v</label>
						<input type="text" inputmode="decimal" id="t2v5v" value="1" />
					</div>
				</div>

				<button id="btnActualizar">Actualizar</button>
			</div>

			<!-- Mitad inferior: espacio UV -->
			<div id="panel-uv">
				<h3>Espacio UV</h3>
				<div id="uv-canvas-wrap">
					<canvas id="uvCanvas"></canvas>
				</div>
			</div>
		</div>

		<script type="module" src="/src/demoAprendizajeUV.js"></script>
	</body>
</html>
